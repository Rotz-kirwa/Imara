<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Finance — Instant Loans Straight to Your Phone</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" />
    <script>
      (function () {
        var cryptoApi = globalThis.crypto;
        if (!cryptoApi || cryptoApi.randomUUID || !cryptoApi.getRandomValues) return;

        var hex = [];
        for (var i = 0; i < 256; i += 1) {
          hex[i] = (i + 256).toString(16).slice(1);
        }

        Object.defineProperty(cryptoApi, "randomUUID", {
          configurable: true,
          value: function () {
            var bytes = new Uint8Array(16);
            cryptoApi.getRandomValues(bytes);
            bytes[6] = (bytes[6] & 0x0f) | 0x40;
            bytes[8] = (bytes[8] & 0x3f) | 0x80;

            return (
              hex[bytes[0]] +
              hex[bytes[1]] +
              hex[bytes[2]] +
              hex[bytes[3]] +
              "-" +
              hex[bytes[4]] +
              hex[bytes[5]] +
              "-" +
              hex[bytes[6]] +
              hex[bytes[7]] +
              "-" +
              hex[bytes[8]] +
              hex[bytes[9]] +
              "-" +
              hex[bytes[10]] +
              hex[bytes[11]] +
              hex[bytes[12]] +
              hex[bytes[13]] +
              hex[bytes[14]] +
              hex[bytes[15]]
            );
          },
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
